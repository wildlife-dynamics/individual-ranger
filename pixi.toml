[workspace]
name = "ranger-report"
platforms = ['linux-64', 'osx-arm64', 'osx-64', 'win-64']
channels = [
  'https://repo.prefix.dev/ecoscope-workflows/',
  'https://repo.prefix.dev/ecoscope-workflows-custom/',
  'conda-forge',
]

[feature.compile.dependencies]
ecoscope-workflows-core = "0.22.18.*"
ecoscope-workflows-ext-ecoscope = "0.22.18.*"
ecoscope-workflows-ext-custom = "0.0.57.*"
pydeck = "0.9.2"
ecoscope-workflows-ext-icf = "0.0.11.*"
ecoscope-workflows-ext-apn = "0.0.28.*"

[environments]
compile = { features = ["compile"], solve-group = "compile", no-default-feature = true }
